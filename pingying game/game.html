<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>皮影音游 - 京胡长调版</title>
    <style>
        body { 
            margin: 0; background: #2b1a11; color: #f2e8cf; 
            overflow: hidden; font-family: 'STKaiti', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; user-select: none;
        }

        .score-board { font-size: 28px; margin-bottom: 10px; color: #f4e4bc; }

        #game-container {
            position: relative; width: 400px; height: 600px;
            background: #e6ccb2; border: 10px solid #5e3023;
            box-shadow: 0 0 50px rgba(0,0,0,0.5) inset;
            cursor: pointer; overflow: hidden; touch-action: none;
        }

        .judge-line {
            position: absolute; bottom: 100px; width: 100%; height: 4px;
            background: #8b0000; opacity: 0.5; pointer-events: none;
            z-index: 20;
        }

        /* 音符容器 */
        .note {
            position: absolute; width: 70px; height: 70px;
            transform: translateX(-50%); pointer-events: none;
            z-index: 10;
        }

        /* 长按音符的身体（长条） */
        .hold-tail {
            position: absolute; width: 30px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
            left: 50%; transform: translateX(-50%);
            bottom: 35px; border-radius: 15px 15px 0 0;
            border: 2px dashed #000;
            z-index: -1;
        }

        .feedback {
            position: absolute; top: 35%; width: 100%; text-align: center;
            font-size: 45px; color: #8b0000; font-weight: bold;
            pointer-events: none; opacity: 0; transition: 0.1s; z-index: 50;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }

        .btn {
            margin-top: 20px; padding: 12px 30px; background: #8b0000;
            color: #f4e4bc; border: none; border-radius: 5px; font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="score-board">得分: <span id="score">0</span></div>

<div id="game-container">
    <div id="start-mask" class="overlay">
        <h2>皮影神韵 · 戏长调</h2>
        <p>京胡高音时，请长按莫停</p>
        <button class="btn" onclick="startGame()">开演</button>
    </div>

    <div id="result-mask" class="overlay" style="display: none;">
        <h2>全剧终</h2>
        <p>最终得分: <span id="final-score">0</span></p>
        <button class="btn" onclick="restartGame()">再演一回</button>
    </div>

    <div class="judge-line"></div>
    <div id="feedback" class="feedback">好！</div>
</div>

<audio id="bgm" src="piyingmusic.mp3"></audio>

<script>
    const container = document.getElementById('game-container');
    const scoreEl = document.getElementById('score');
    const feedbackEl = document.getElementById('feedback');
    const bgm = document.getElementById('bgm');
    const startMask = document.getElementById('start-mask');
    const resultMask = document.getElementById('result-mask');
    
    let score = 0;
    let activeNotes = [];
    let isPlaying = false;
    let isMouseDown = false; 
    const speed = 4.8;
    const judgeY = 500; // 判定线位置

    const shadowIcons = [
        // 武生
        `<svg viewBox="0 0 64 64" fill="black"><path d="M32 18 L34 2 L30 5 L32 18 Z"/><circle cx="32" cy="18" r="5"/><path d="M32 23 L42 35 L32 45 L22 35 Z"/><path d="M32 45 L38 58 M32 45 L26 58" stroke="black" stroke-width="3"/></svg>`,
        // 旦角（你要求的版本）
        `<svg viewBox="0 0 64 64" fill="black"><path d="M32 10 Q40 10 40 18 Q40 25 32 25 Q24 25 24 18 Q24 10 32 10 Z"/><path d="M32 25 L40 58 L24 58 Z"/><path d="M28 30 Q15 35 12 50 M36 30 Q49 35 52 50" stroke="black" stroke-width="2" fill="none"/><circle cx="32" cy="12" r="2" fill="white"/><path d="M24 18 L20 25 M40 18 L44 25" stroke="black" stroke-width="1"/></svg>`
    ];

    // 精调节奏点 (t:毫秒, type:类型, len:长条像素长度)
    const rhythmPoints = [];
    function generateRhythm() {
        for(let i=500; i<73000; i += 1000) {
            let type = 'short';
            let len = 0;
            // 京胡高音区：增加长按出现率
            const isHighSection = (i > 28000 && i < 45000) || (i > 55000 && i < 70000);
            
            if (isHighSection) {
                if (i % 3000 < 1000) { type = 'hold'; len = 250; }
                else { i += 300; type = 'short'; } // 高音区点位更密
            } else {
                if (i % 5000 < 1000) { type = 'hold'; len = 150; }
            }
            rhythmPoints.push({t: i, type, len});
        }
    }
    generateRhythm();

    function createNote(data) {
        if(!isPlaying) return;
        const note = document.createElement('div');
        note.className = 'note';
        note.innerHTML = shadowIcons[Math.floor(Math.random()*2)];
        
        let tail = null;
        if(data.type === 'hold') {
            tail = document.createElement('div');
            tail.className = 'hold-tail';
            tail.style.height = data.len + 'px';
            note.appendChild(tail);
        }

        note.style.left = (60 + Math.random() * 280) + 'px';
        note.style.top = '-300px'; // 初始位置
        container.appendChild(note);
        activeNotes.push({ el: note, tail: tail, y: -300, type: data.type, initialLen: data.len, currentLen: data.len, status: 'falling' });
    }

    function gameLoop() {
        if(!isPlaying) return;

        for (let i = activeNotes.length - 1; i >= 0; i--) {
            const n = activeNotes[i];
            
            if (n.status === 'holding' && isMouseDown) {
                // --- 长按中逻辑 ---
                // 头部停在判定线
                n.y = judgeY;
                // 长度随速度缩短
                n.currentLen -= speed;
                if (n.tail) n.tail.style.height = Math.max(0, n.currentLen) + 'px';
                
                score += 3;
                scoreEl.innerText = score;
                n.el.style.filter = "drop-shadow(0 0 10px gold)";

                // 如果长度缩减完毕，表示长音结束
                if (n.currentLen <= 0) {
                    n.status = 'hit';
                    n.el.style.opacity = '0';
                    showFeedback("满堂彩！");
                }
            } else {
                // --- 正常下落或松手逻辑 ---
                n.y += speed;
                if (n.status === 'holding' && !isMouseDown) {
                    n.status = 'missed';
                    n.el.style.filter = "grayscale(1) opacity(0.5)";
                    showFeedback("断了");
                }
            }

            n.el.style.top = n.y + 'px';

            // 移除屏幕外音符
            if (n.y > 650 || (n.status === 'hit' && n.y >= judgeY)) {
                if (n.status === 'falling') showFeedback("错过");
                n.el.remove();
                activeNotes.splice(i, 1);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    container.onmousedown = (e) => {
        if (!isPlaying || e.target.tagName === 'BUTTON') return;
        isMouseDown = true;
        
        activeNotes.forEach(n => {
            if (n.status === 'falling' && Math.abs(n.y - judgeY) < 60) {
                if (n.type === 'short') {
                    n.status = 'hit';
                    n.el.style.transform = "translateX(-50%) scale(1.6)";
                    n.el.style.opacity = "0";
                    n.el.style.transition = "0.2s";
                    score += 20;
                    showFeedback("妙！");
                } else {
                    n.status = 'holding';
                    showFeedback("连！");
                }
                scoreEl.innerText = score;
            }
        });
    };

    window.onmouseup = () => { isMouseDown = false; };

    function showFeedback(txt) {
        feedbackEl.innerText = txt;
        feedbackEl.style.opacity = 1;
        setTimeout(() => feedbackEl.style.opacity = 0, 300);
    }

    function startGame() {
        startMask.style.display = 'none';
        isPlaying = true;
        score = 0;
        scoreEl.innerText = score;
        bgm.currentTime = 0;
        bgm.play();
        gameLoop();
        rhythmPoints.forEach(p => setTimeout(() => createNote(p), p.t));
        setTimeout(() => {
            isPlaying = false;
            document.getElementById('final-score').innerText = score;
            resultMask.style.display = 'flex';
        }, 74000);
    }

    function restartGame() {
        location.reload(); // 简单粗暴的重启方式
    }
</script>
</body>
</html>
